<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AI Week 2026 — Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;500;700&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0b;
    --bg-elev: #131316;
    --bg-elev-2: #1c1c21;
    --line: #26262c;
    --line-soft: #1a1a1e;
    --ink: #ededee;
    --ink-2: #a6a6ad;
    --ink-3: #6b6b73;
    --accent: #ffb627;
    --accent-soft: #ffb6271a;
    --fit-5: #ffb627;
    --fit-4: #d9a230;
    --fit-3: #7a7060;
    --fit-2: #4a4a52;
    --fit-1: #2e2e34;
    --display: 'Fraunces', Georgia, serif;
    --body: 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --safe-top: env(safe-area-inset-top, 0);
    --safe-bot: env(safe-area-inset-bottom, 0);
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; font-family: var(--body); overscroll-behavior-y: contain; }
  body { padding-top: var(--safe-top); padding-bottom: calc(var(--safe-bot) + 88px); min-height: 100vh; }
  button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  a { color: var(--accent); text-decoration: none; }

  /* ===================== HEADER ===================== */
  header.app-header {
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    background: rgba(10,10,11,0.78);
    border-bottom: 1px solid var(--line-soft);
    padding-top: var(--safe-top);
  }
  .header-row {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 14px 18px 6px;
  }
  .brand {
    font-family: var(--display); font-weight: 800; font-size: 22px; letter-spacing: -0.02em;
  }
  .brand .dot { color: var(--accent); }
  .brand small {
    display: block; font-family: var(--mono); font-weight: 500; font-size: 9.5px; color: var(--ink-3);
    letter-spacing: 0.18em; text-transform: uppercase; margin-top: 2px;
  }
  .now-ind {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ink-2); display: flex; align-items: center; gap: 6px;
  }
  .now-ind::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 0 0 var(--accent); animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(255,182,39,0.6); }
    70% { box-shadow: 0 0 0 8px rgba(255,182,39,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,182,39,0); }
  }

  /* Day tabs */
  .day-tabs {
    display: flex; padding: 4px 14px 10px; gap: 4px;
  }
  .day-tab {
    flex: 1; padding: 9px 6px 8px; border-radius: 10px;
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3);
    transition: color .15s, background .15s;
  }
  .day-tab.active { background: var(--bg-elev-2); color: var(--ink); }
  .day-tab strong { display: block; font-family: var(--display); font-weight: 600;
    font-size: 14px; letter-spacing: -0.01em; text-transform: none; margin-top: 2px; }

  /* Filter chips */
  .filters {
    display: flex; gap: 7px; padding: 2px 18px 12px; overflow-x: auto;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0; padding: 6px 11px; border-radius: 999px;
    border: 1px solid var(--line); background: transparent;
    font-family: var(--mono); font-size: 10.5px; font-weight: 500;
    letter-spacing: 0.04em; color: var(--ink-2); white-space: nowrap;
    transition: all .15s;
  }
  .chip.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .chip .num { opacity: .55; margin-left: 4px; font-size: 9.5px; }

  /* ===================== MAIN ===================== */
  main { padding: 0; }

  /* Hero "Now happening" panel */
  .now-panel {
    margin: 14px 14px 18px; padding: 16px 16px 14px;
    background: linear-gradient(165deg, #1a1408 0%, #131316 70%);
    border: 1px solid #2a2010; border-radius: 16px;
    position: relative; overflow: hidden;
  }
  .now-panel::before {
    content: ''; position: absolute; top: 0; right: -40px; width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(255,182,39,0.12) 0%, transparent 65%);
    pointer-events: none;
  }
  .now-panel-head {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
  }
  .now-panel-title {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--accent);
  }
  .now-panel-time {
    font-family: var(--mono); font-size: 10px; color: var(--ink-3);
  }
  .now-best {
    font-family: var(--display); font-weight: 600; font-size: 17px; line-height: 1.25;
    letter-spacing: -0.015em; margin: 0 0 6px;
  }
  .now-best-meta {
    font-family: var(--mono); font-size: 10.5px; color: var(--ink-2);
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .now-empty {
    color: var(--ink-3); font-size: 13px; font-style: italic;
  }

  /* Time-slot section header */
  .slot-section { margin: 0 0 8px; }
  .slot-header {
    display: flex; align-items: center; gap: 10px;
    padding: 18px 18px 8px;
    position: sticky; top: 0; z-index: 5;
  }
  .slot-time {
    font-family: var(--display); font-weight: 800; font-size: 26px;
    letter-spacing: -0.03em; line-height: 1;
  }
  .slot-time .ampm { font-size: 12px; color: var(--ink-3); font-weight: 600; margin-left: 4px; letter-spacing: 0; }
  .slot-divider {
    flex: 1; height: 1px; background: var(--line-soft);
  }
  .slot-count {
    font-family: var(--mono); font-size: 10px; color: var(--ink-3);
    letter-spacing: 0.06em;
  }
  .slot-status {
    font-family: var(--mono); font-size: 9.5px; padding: 3px 7px; border-radius: 4px;
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .slot-status.now { background: var(--accent); color: #000; }
  .slot-status.next { background: var(--bg-elev-2); color: var(--accent); border: 1px solid var(--accent); }
  .slot-status.past { background: transparent; color: var(--ink-3); border: 1px solid var(--line); }

  /* Session card */
  .cards { padding: 0 14px; display: flex; flex-direction: column; gap: 8px; }
  .card {
    background: var(--bg-elev); border: 1px solid var(--line-soft); border-radius: 12px;
    padding: 12px 14px 12px 0; display: grid;
    grid-template-columns: 52px 1fr; gap: 0;
    text-align: left; width: 100%; position: relative;
    transition: background .15s, border-color .15s, transform .1s;
  }
  .card:active { transform: scale(0.99); }
  .card.fit-5 { border-color: rgba(255,182,39,0.35); background: linear-gradient(180deg, rgba(255,182,39,0.04) 0%, var(--bg-elev) 100%); }
  .card.fit-4 { border-color: rgba(217,162,48,0.22); }
  .card.fit-1 { opacity: 0.5; }
  .card.fit-2 { opacity: 0.78; }

  .fit-rail {
    position: relative; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    border-right: 1px solid var(--line-soft);
    padding: 2px 0;
  }
  .fit-num {
    font-family: var(--display); font-weight: 800; font-size: 28px;
    line-height: 1; letter-spacing: -0.04em;
  }
  .fit-5 .fit-num { color: var(--fit-5); }
  .fit-4 .fit-num { color: var(--fit-4); }
  .fit-3 .fit-num { color: var(--fit-3); }
  .fit-2 .fit-num { color: var(--fit-2); }
  .fit-1 .fit-num { color: var(--fit-1); }
  .fit-label {
    font-family: var(--mono); font-size: 8px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--ink-3); margin-top: 4px;
  }

  .card-body { padding: 0 0 0 12px; min-width: 0; }
  .card-top {
    display: flex; gap: 10px; align-items: baseline; margin-bottom: 4px;
    font-family: var(--mono); font-size: 10.5px; color: var(--ink-2);
    letter-spacing: 0.02em;
  }
  .card-stage { color: var(--ink); font-weight: 500; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
  .card-time { color: var(--ink-3); flex-shrink: 0; }
  .card-title {
    font-family: var(--display); font-weight: 600; font-size: 15px;
    line-height: 1.28; letter-spacing: -0.012em; color: var(--ink);
    margin: 0 0 6px;
    /* Truncate to ~3 lines */
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-speakers {
    font-size: 11.5px; color: var(--ink-2); line-height: 1.35;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-speakers .sp-co { color: var(--ink-3); }
  .card-tags { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
  .tag {
    font-family: var(--mono); font-size: 9px; padding: 2px 6px; border-radius: 3px;
    letter-spacing: 0.06em; text-transform: uppercase;
    background: var(--bg-elev-2); color: var(--ink-2); border: 1px solid var(--line-soft);
  }
  .tag.featured { background: var(--accent-soft); color: var(--accent); border-color: rgba(255,182,39,0.3); }

  .now-indicator-pill {
    position: absolute; top: 10px; right: 10px;
    font-family: var(--mono); font-size: 8.5px; letter-spacing: 0.14em;
    padding: 2px 6px; border-radius: 3px; background: var(--accent); color: #000;
    text-transform: uppercase; font-weight: 600;
  }

  /* ===================== GRID VIEW (all stages at once) ===================== */
  .grid-view {
    display: none;
  }
  body.view-grid .grid-view { display: block; }
  body.view-grid .list-view { display: none; }

  .grid-stage-tabs {
    display: flex; gap: 6px; padding: 8px 14px 12px; overflow-x: auto;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
    border-bottom: 1px solid var(--line-soft);
  }
  .grid-stage-tabs::-webkit-scrollbar { display: none; }

  .grid-slot {
    border-bottom: 1px solid var(--line-soft);
  }
  .grid-slot-time {
    position: sticky; top: 0;
    background: var(--bg); border-bottom: 1px solid var(--line-soft);
    padding: 10px 18px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em;
    color: var(--ink-2); text-transform: uppercase;
    display: flex; align-items: center; justify-content: space-between;
  }
  .grid-slot-time strong { color: var(--ink); font-size: 13px; }
  .grid-slot.is-now .grid-slot-time { background: var(--accent-soft); color: var(--accent); border-bottom-color: rgba(255,182,39,0.3); }
  .grid-slot.is-now .grid-slot-time strong { color: var(--accent); }

  .grid-row {
    display: flex; gap: 6px; padding: 8px 14px; overflow-x: auto;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .grid-row::-webkit-scrollbar { display: none; }
  .grid-cell {
    flex-shrink: 0; width: 200px; min-height: 86px;
    background: var(--bg-elev); border: 1px solid var(--line-soft); border-radius: 9px;
    padding: 9px 10px; display: flex; flex-direction: column; justify-content: space-between;
    position: relative;
  }
  .grid-cell.fit-5 { border-color: rgba(255,182,39,0.35); background: linear-gradient(155deg, rgba(255,182,39,0.06) 0%, var(--bg-elev) 100%); }
  .grid-cell.fit-4 { border-color: rgba(217,162,48,0.22); }
  .grid-cell.fit-1 { opacity: 0.45; }
  .grid-cell.fit-2 { opacity: 0.7; }
  .grid-cell-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; gap: 6px;}
  .grid-cell-stage { font-family: var(--mono); font-size: 9px; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--ink-3); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;}
  .grid-cell-fit {
    font-family: var(--display); font-weight: 800; font-size: 15px; line-height: 1; letter-spacing: -0.03em;
  }
  .grid-cell.fit-5 .grid-cell-fit { color: var(--fit-5); }
  .grid-cell.fit-4 .grid-cell-fit { color: var(--fit-4); }
  .grid-cell.fit-3 .grid-cell-fit { color: var(--fit-3); }
  .grid-cell.fit-2 .grid-cell-fit { color: var(--fit-2); }
  .grid-cell.fit-1 .grid-cell-fit { color: var(--fit-1); }
  .grid-cell-title {
    font-family: var(--display); font-weight: 600; font-size: 12px; line-height: 1.22;
    letter-spacing: -0.005em; color: var(--ink); margin: 0;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }
  .grid-cell-sp {
    font-size: 10px; color: var(--ink-2); margin-top: 4px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ===================== DETAIL SHEET ===================== */
  .sheet-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 90;
    opacity: 0; pointer-events: none; transition: opacity .25s;
    backdrop-filter: blur(2px);
  }
  .sheet-overlay.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 100;
    background: var(--bg-elev); border-top: 1px solid var(--line);
    border-radius: 22px 22px 0 0;
    max-height: 88vh; overflow-y: auto;
    transform: translateY(100%); transition: transform .3s cubic-bezier(0.16,1,0.3,1);
    padding-bottom: calc(var(--safe-bot) + 24px);
  }
  .sheet.open { transform: translateY(0); }
  .sheet-grabber {
    width: 38px; height: 4px; background: var(--line); border-radius: 2px;
    margin: 10px auto 0;
  }
  .sheet-inner { padding: 18px 20px 0; }
  .sheet-fit-row {
    display: flex; align-items: baseline; gap: 14px; margin-bottom: 12px;
  }
  .sheet-fit-num {
    font-family: var(--display); font-weight: 800; font-size: 64px; line-height: 0.85; letter-spacing: -0.05em;
  }
  .sheet-fit-num.fit-5 { color: var(--fit-5); }
  .sheet-fit-num.fit-4 { color: var(--fit-4); }
  .sheet-fit-num.fit-3 { color: var(--fit-3); }
  .sheet-fit-num.fit-2 { color: var(--fit-2); }
  .sheet-fit-num.fit-1 { color: var(--fit-1); }
  .sheet-fit-meta { flex: 1; }
  .sheet-fit-label {
    font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.16em;
    color: var(--ink-3); text-transform: uppercase; margin-bottom: 2px;
  }
  .sheet-fit-desc {
    font-family: var(--display); font-weight: 600; font-size: 14px; letter-spacing: -0.01em;
  }
  .sheet-meta {
    display: flex; gap: 12px; padding: 12px 0; border-top: 1px solid var(--line-soft);
    border-bottom: 1px solid var(--line-soft); margin-bottom: 16px;
    font-family: var(--mono); font-size: 11px; color: var(--ink-2);
    flex-wrap: wrap;
  }
  .sheet-meta-item { display: flex; flex-direction: column; gap: 2px; }
  .sheet-meta-item .lbl { font-size: 8.5px; color: var(--ink-3); letter-spacing: 0.14em; text-transform: uppercase; }
  .sheet-meta-item .val { color: var(--ink); }
  .sheet-title {
    font-family: var(--display); font-weight: 600; font-size: 24px; line-height: 1.18;
    letter-spacing: -0.02em; margin: 0 0 14px;
  }
  .sheet-speakers { margin-bottom: 20px; }
  .sheet-speaker {
    padding: 10px 0; border-bottom: 1px solid var(--line-soft);
  }
  .sheet-speaker:last-child { border-bottom: 0; }
  .sheet-sp-name {
    font-family: var(--body); font-weight: 600; font-size: 14.5px; color: var(--ink);
  }
  .sheet-sp-role { font-size: 11.5px; color: var(--ink-2); margin-top: 1px; }
  .sheet-sp-co { font-family: var(--mono); font-size: 10px; color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 3px; }
  .sheet-link {
    display: block; text-align: center;
    background: var(--ink); color: var(--bg); padding: 13px;
    border-radius: 10px; font-weight: 600; font-size: 13px;
    margin-top: 8px; letter-spacing: -0.005em;
  }

  /* ===================== BOTTOM NAV ===================== */
  .bottom-nav {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 60;
    display: flex; padding: 8px 14px calc(var(--safe-bot) + 10px);
    background: rgba(10,10,11,0.85); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border-top: 1px solid var(--line-soft);
    gap: 4px;
  }
  .nav-btn {
    flex: 1; padding: 9px 4px 6px; border-radius: 10px;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    color: var(--ink-3); transition: color .15s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 20px; height: 20px; stroke-width: 1.6; }
  .nav-btn span {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
  }

  /* Scrolling polish */
  ::-webkit-scrollbar { width: 0; height: 0; }
  .sheet { scrollbar-width: thin; }

  /* "Jump to now" floating button */
  .jump-now {
    position: fixed; right: 14px; bottom: calc(var(--safe-bot) + 96px); z-index: 55;
    background: var(--accent); color: #000;
    padding: 10px 14px; border-radius: 999px;
    font-family: var(--mono); font-size: 10.5px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase;
    box-shadow: 0 8px 22px rgba(255,182,39,0.35), 0 2px 6px rgba(0,0,0,0.4);
    opacity: 0; transform: translateY(8px); pointer-events: none;
    transition: opacity .2s, transform .2s;
  }
  .jump-now.show { opacity: 1; transform: translateY(0); pointer-events: auto; }

  /* Empty / no-results state */
  .empty {
    padding: 40px 20px; text-align: center; color: var(--ink-3);
  }
  .empty-title { font-family: var(--display); font-size: 18px; color: var(--ink-2); margin-bottom: 6px; }
  .empty-sub { font-size: 12.5px; }

<body class="view-list">

    </button>
  </div>
  <div class="filters" id="filters">

    <button class="chip" data-fit="5">★ 5 Only<span class="num"></span></button>

<main>
  <div class="now-panel" id="nowPanel">

    </div>

  <div class="list-view" id="listView"></div>

</div>

<!-- Bottom nav -->
<nav class="bottom-nav">

    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    <span>Timeline</span>
  </button>
  <button class="nav-btn" data-view="grid">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    <span>All Stages</span>
  </button>
  <button class="nav-btn" data-view="top">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polygon points="12,2 15,9 22,9 16,14 18,21 12,17 6,21 8,14 2,9 9,9"/></svg>
    <span>Top Picks</span>
  </button>

<script>
let SESSIONS = [];

// =================== STATE ===================
const state = {
  day: 1,
  view: 'list',         // 'list' | 'grid' | 'top'
  minFit: 0,            // 0 = all
  // Demo override: during the conference set null. For preview, snap to event window.
  nowOverride: null,
};

const FIT_DESCS = {
  5: 'Perfect fit. Don\u2019t miss.',
  4: 'Strong match for your goals.',
  3: 'Relevant \u2014 worth attending if free.',
  2: 'Tangential. Only if curious.',
  1: 'Skip. Off-topic for you.'
};
// Source export is one hour behind local event time.
const TIMEZONE_OFFSET_MINUTES = 60;

// =================== HELPERS ===================
const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];

function fmtTime(min){
  const normalized = normalizeDayMinutes(min);
  const h = Math.floor(normalized/60), m = normalized%60;
  const ap = h >= 12 ? 'PM' : 'AM';
  const h12 = ((h+11)%12)+1;
  return `${h12}:${String(m).padStart(2,'0')} ${ap}`;
}

// Normalize absolute minutes to a same-day minute value [0, 1439].
function normalizeDayMinutes(min){
  return ((min % 1440) + 1440) % 1440;
}

// Shift session start/end times by a timezone offset and refresh formatted labels.
function applyTimezoneOffset(sessions, offsetMinutes){
  const safeOffset = Number.isFinite(offsetMinutes) ? offsetMinutes : 0;
  return sessions.map(s => {
    const startMin = s.startMin + safeOffset;
    const endMin = s.endMin + safeOffset;
    return {
      ...s,
      startMin,
      endMin,
      start: fmtTime(startMin),
      end: fmtTime(endMin)
    };
  });
}

function nowMinutes() {
  if (state.nowOverride !== null) return state.nowOverride;
  const d = new Date();
  // Map real "now" into event window for demo purposes only if outside event days.
  // The event is May 19-20, 2026; if we're on those days use real time, otherwise we'll
  // simulate a position in the day based on real hour for preview convenience.
  const isEventDay = (d.getFullYear() === 2026 && d.getMonth() === 4 && (d.getDate() === 19 || d.getDate() === 20));
  if (isEventDay) return d.getHours()*60 + d.getMinutes();
  // Preview mode: use real time of day clamped into [8:00, 17:00]
  let mins = d.getHours()*60 + d.getMinutes();
  if (mins < 8*60) mins = 8*60;
  if (mins > 17*60) mins = 17*60;
  return mins;
}

function currentEventDay() {
  if (state.nowOverride !== null) return state.day;
  const d = new Date();
  if (d.getFullYear() === 2026 && d.getMonth() === 4) {
    if (d.getDate() === 19) return 1;
    if (d.getDate() === 20) return 2;
  }
  return state.day; // use whatever the user picked
}

function sessionsForDay(day) {
  let arr = SESSIONS.filter(s => s.day === day);
  if (state.minFit > 0) arr = arr.filter(s => s.fit >= state.minFit);
  return arr;
}

function groupBySlot(arr) {
  // Group by start time; preserve sorted order
  arr.sort((a,b) => a.startMin - b.startMin || a.stage.localeCompare(b.stage));
  const slots = new Map();
  for (const s of arr) {
    if (!slots.has(s.startMin)) slots.set(s.startMin, []);
    slots.get(s.startMin).push(s);
  }
  return [...slots.entries()].map(([min, sessions]) => ({ min, sessions }));
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function speakerLine(speakers, short=false){
  if (!speakers || !speakers.length) return '';
  return speakers.map(sp => {
    const co = sp.company ? `<span class="sp-co"> \u00b7 ${escapeHtml(sp.company)}</span>` : '';
    return `${escapeHtml(sp.name)}${short ? '' : co}`;
  }).join(short ? ', ' : ' &middot; ');
}

function slotStatus(slotMin, day) {
  const today = currentEventDay() === day;
  if (!today) return null;
  const now = nowMinutes();
  // Find next slot start to compute window
  const allSlots = [...new Set(SESSIONS.filter(s => s.day === day).map(s => s.startMin))].sort((a,b)=>a-b);
  const idx = allSlots.indexOf(slotMin);
  const nextSlot = idx >= 0 && idx < allSlots.length-1 ? allSlots[idx+1] : slotMin + 60;
  if (now >= slotMin && now < nextSlot) return 'now';
  if (idx > 0 && now >= allSlots[idx-1] && now < slotMin && slotMin - now <= 20) return 'next';
  if (now >= nextSlot) return 'past';
  return null;
}

// =================== RENDER: LIST (Timeline) ===================
function renderList() {
  const root = $('#listView');
  const arr = sessionsForDay(state.day);
  if (!arr.length) {
    root.innerHTML = `<div class="empty"><div class="empty-title">Nothing matches</div><div class="empty-sub">Loosen the filter to see more sessions.</div></div>`;
    return;
  }
  const slots = groupBySlot(arr);
  let html = '';
  for (const slot of slots) {
    const status = slotStatus(slot.min, state.day);
    const statusBadge = status ? `<span class="slot-status ${status}">${status}</span>` : '';
    const top = slot.sessions.reduce((m,s) => Math.max(m, s.fit), 0);
    html += `<section class="slot-section" data-slotmin="${slot.min}" data-status="${status||''}">`;
    html += `<div class="slot-header">
      <div class="slot-time">${fmtTime(slot.min).split(' ')[0]}<span class="ampm">${fmtTime(slot.min).split(' ')[1]}</span></div>
      <div class="slot-divider"></div>
      ${statusBadge}
      <span class="slot-count">${slot.sessions.length} \u00b7 top ${top}</span>
    </div>`;
    html += `<div class="cards">`;
    for (const s of slot.sessions) {
      html += renderCard(s, status === 'now');
    }
    html += `</div></section>`;
  }
  root.innerHTML = html;
}

function renderCard(s, isNow=false) {
  const tags = (s.tags||[]).filter(t => t && t !== 'Stage' && t !== 'Standup').map(t =>
    `<span class="tag${t==='Featured'?' featured':''}">${escapeHtml(t)}</span>`
  ).join('');
  return `<button class="card fit-${s.fit}" data-id="${s.id}">
    <div class="fit-rail">
      <div class="fit-num">${s.fit}</div>
      <div class="fit-label">Fit</div>
    </div>
    <div class="card-body">
      ${isNow ? '<span class="now-indicator-pill">Now</span>' : ''}
      <div class="card-top">
        <span class="card-stage">${escapeHtml(s.stage)}</span>
        <span class="card-time">${escapeHtml(s.start)} \u2013 ${escapeHtml(s.end)}</span>
      </div>
      <div class="card-title">${escapeHtml(s.title)}</div>
      <div class="card-speakers">${speakerLine(s.speakers)}</div>
      ${tags ? `<div class="card-tags">${tags}</div>` : ''}
    </div>
  </button>`;
}

// =================== RENDER: GRID (All stages) ===================
function renderGrid() {
  const root = $('#gridView');
  const arr = sessionsForDay(state.day);
  if (!arr.length) {
    root.innerHTML = `<div class="empty"><div class="empty-title">Nothing matches</div><div class="empty-sub">Loosen the filter.</div></div>`;
    return;
  }
  // Group by start slot, then sort each by fit desc so best sessions appear first in horizontal scroll
  const slots = groupBySlot([...arr]);
  for (const slot of slots) slot.sessions.sort((a,b) => b.fit - a.fit || a.stage.localeCompare(b.stage));

  let html = '';
  for (const slot of slots) {
    const status = slotStatus(slot.min, state.day);
    html += `<div class="grid-slot ${status === 'now' ? 'is-now' : ''}" data-slotmin="${slot.min}">`;
    html += `<div class="grid-slot-time"><strong>${fmtTime(slot.min)}</strong><span>${slot.sessions.length} sessions ${status ? '\u00b7 ' + status.toUpperCase() : ''}</span></div>`;
    html += `<div class="grid-row">`;
    for (const s of slot.sessions) {
      const sp = (s.speakers || []).slice(0,1).map(x => x.name).join(', ');
      html += `<button class="grid-cell fit-${s.fit}" data-id="${s.id}">
        <div>
          <div class="grid-cell-head">
            <span class="grid-cell-stage">${escapeHtml(s.stage)}</span>
            <span class="grid-cell-fit">${s.fit}</span>
          </div>
          <div class="grid-cell-title">${escapeHtml(s.title)}</div>
        </div>
        <div class="grid-cell-sp">${escapeHtml(sp || '\u2014')}</div>
      </button>`;
    }
    html += `</div></div>`;
  }
  root.innerHTML = html;
}

// =================== RENDER: TOP PICKS ===================
function renderTop() {
  const root = $('#listView');
  const arr = SESSIONS.filter(s => s.day === state.day && s.fit >= 4);
  arr.sort((a,b) => b.fit - a.fit || a.startMin - b.startMin);
  if (!arr.length) {
    root.innerHTML = `<div class="empty"><div class="empty-title">No top picks today</div></div>`;
    return;
  }
  let html = `<div style="padding:20px 18px 8px;">
    <div style="font-family:var(--display);font-weight:600;font-size:22px;letter-spacing:-0.02em;">Your top picks</div>
    <div style="font-family:var(--mono);font-size:10.5px;color:var(--ink-3);letter-spacing:0.06em;margin-top:4px;">DAY ${state.day} \u00b7 FIT 4+ \u00b7 ${arr.length} SESSIONS</div>
  </div>`;
  html += '<div class="cards">';
  for (const s of arr) html += renderCard(s, false);
  html += '</div>';
  root.innerHTML = html;
}

// =================== NOW PANEL ===================
function renderNowPanel() {
  const titleEl = $('#nowPanelTitle');
  const timeEl = $('#nowPanelTime');
  const body = $('#nowPanelBody');
  const day = currentEventDay();
  const isToday = day === state.day;
  const now = nowMinutes();

  timeEl.textContent = `${fmtTime(now)} \u00b7 Day ${day}`;

  if (!isToday) {
    titleEl.textContent = 'Day Preview';
    const arr = SESSIONS.filter(s => s.day === state.day && s.fit >= 4);
    arr.sort((a,b) => b.fit - a.fit);
    const best = arr.slice(0,1)[0];
    if (!best) { body.innerHTML = `<div class="now-empty">No fit-4+ sessions on this day.</div>`; return; }
    body.innerHTML = `
      <div class="now-best">${escapeHtml(best.title)}</div>
      <div class="now-best-meta">
        <span style="color:var(--accent);font-weight:600">FIT ${best.fit}</span>
        <span>${escapeHtml(best.stage)}</span>
        <span>\u00b7</span>
        <span>${escapeHtml(best.start)}</span>
      </div>`;
    return;
  }

  // Today: find what's happening right now
  const playing = SESSIONS.filter(s => s.day === day && s.startMin <= now && s.endMin > now);
  playing.sort((a,b) => b.fit - a.fit);
  if (playing.length) {
    const best = playing[0];
    titleEl.textContent = 'Happening now \u00b7 best pick';
    body.innerHTML = `
      <div class="now-best">${escapeHtml(best.title)}</div>
      <div class="now-best-meta">
        <span style="color:var(--accent);font-weight:600">FIT ${best.fit}</span>
        <span>${escapeHtml(best.stage)}</span>
        <span>\u00b7</span>
        <span>until ${escapeHtml(best.end)}</span>
        <span>\u00b7</span>
        <span>${playing.length} sessions live</span>
      </div>
      <button class="card fit-${best.fit}" data-id="${best.id}" style="margin-top:12px;background:rgba(255,255,255,0.02);"><div class="fit-rail"><div class="fit-num">${best.fit}</div><div class="fit-label">Fit</div></div><div class="card-body"><div class="card-top"><span class="card-stage">Tap for details</span></div><div class="card-speakers">${speakerLine(best.speakers)}</div></div></button>`;
    return;
  }
  // Otherwise, next up
  const upcoming = SESSIONS.filter(s => s.day === day && s.startMin > now).sort((a,b) => a.startMin - b.startMin || b.fit - a.fit);
  if (upcoming.length) {
    const next = upcoming[0];
    titleEl.textContent = 'Next up';
    body.innerHTML = `
      <div class="now-best">${escapeHtml(next.title)}</div>
      <div class="now-best-meta">
        <span style="color:var(--accent);font-weight:600">FIT ${next.fit}</span>
        <span>${escapeHtml(next.stage)}</span>
        <span>\u00b7</span>
        <span>starts ${escapeHtml(next.start)}</span>
      </div>`;
    return;
  }
  titleEl.textContent = 'Wrapped';
  body.innerHTML = `<div class="now-empty">Day ${day} is done. Check tomorrow.</div>`;
}

// =================== DETAIL SHEET ===================
function openSheet(id) {
  const s = SESSIONS.find(x => x.id === id);
  if (!s) return;
  const inner = $('#sheetInner');
  inner.innerHTML = `
    <div class="sheet-fit-row">
      <div class="sheet-fit-num fit-${s.fit}">${s.fit}</div>
      <div class="sheet-fit-meta">
        <div class="sheet-fit-label">Fit Score</div>
        <div class="sheet-fit-desc">${FIT_DESCS[s.fit]}</div>
      </div>
    </div>
    <div class="sheet-meta">
      <div class="sheet-meta-item"><span class="lbl">Day</span><span class="val">${escapeHtml(s.date)}</span></div>
      <div class="sheet-meta-item"><span class="lbl">Time</span><span class="val">${escapeHtml(s.start)} \u2013 ${escapeHtml(s.end)}</span></div>
      <div class="sheet-meta-item"><span class="lbl">Stage</span><span class="val">${escapeHtml(s.stage)}</span></div>
    </div>
    <h2 class="sheet-title">${escapeHtml(s.title)}</h2>
    <div class="sheet-speakers">
      ${(s.speakers||[]).map(sp => `
        <div class="sheet-speaker">
          <div class="sheet-sp-name">${escapeHtml(sp.name)}</div>
          ${sp.role ? `<div class="sheet-sp-role">${escapeHtml(sp.role)}</div>` : ''}
          ${sp.company ? `<div class="sheet-sp-co">${escapeHtml(sp.company)}</div>` : ''}
        </div>`).join('') || '<div style="color:var(--ink-3);font-size:13px;">No speakers listed.</div>'}
    </div>
    ${s.url ? `<a class="sheet-link" href="${escapeHtml(s.url)}" target="_blank" rel="noopener">Open on AI Week app \u2192</a>` : ''}
  `;
  $('#sheet').classList.add('open');
  $('#sheetOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeSheet() {
  $('#sheet').classList.remove('open');
  $('#sheetOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// =================== EVENTS ===================
function attachEvents() {
  // Day tabs
  $$('.day-tab').forEach(btn => btn.addEventListener('click', () => {
    state.day = +btn.dataset.day;
    $$('.day-tab').forEach(b => b.classList.toggle('active', b === btn));
    rerender();
  }));
  // Filter chips
  $$('.chip').forEach(c => c.addEventListener('click', () => {
    state.minFit = +c.dataset.fit;
    $$('.chip').forEach(x => x.classList.toggle('active', x === c));
    rerender();
  }));
  // Bottom nav
  $$('.nav-btn').forEach(b => b.addEventListener('click', () => {
    state.view = b.dataset.view;
    $$('.nav-btn').forEach(x => x.classList.toggle('active', x === b));
    document.body.className = `view-${state.view === 'top' ? 'list' : state.view}`;
    rerender();
  }));
  // Card clicks (delegate)
  document.addEventListener('click', e => {
    const card = e.target.closest('[data-id]');
    if (card) {
      openSheet(card.dataset.id);
    }
  });
  // Close sheet
  $('#sheetOverlay').addEventListener('click', closeSheet);
  // Swipe-down on sheet grabber area
  let touchStart = null;
  $('#sheet').addEventListener('touchstart', e => { touchStart = e.touches[0].clientY; });
  $('#sheet').addEventListener('touchmove', e => {
    if (touchStart === null) return;
    const dy = e.touches[0].clientY - touchStart;
    if (dy > 80 && $('#sheet').scrollTop === 0) { closeSheet(); touchStart = null; }
  });
  // Jump to now
  $('#jumpNow').addEventListener('click', scrollToNow);
  // Update filter counts
  updateChipCounts();
  // Show jump-now button when scrolled past now
  window.addEventListener('scroll', updateJumpBtn, { passive: true });
}

function updateChipCounts() {
  const day = state.day;
  const all = SESSIONS.filter(s => s.day === day);
  const counts = { 0: all.length, 5: 0, 4: 0, 3: 0 };
  for (const s of all) {
    if (s.fit >= 5) counts[5]++;
    if (s.fit >= 4) counts[4]++;
    if (s.fit >= 3) counts[3]++;
  }
  $$('.chip').forEach(c => {
    const f = +c.dataset.fit;
    c.querySelector('.num').textContent = counts[f] != null ? counts[f] : '';
  });
}

function scrollToNow() {
  const day = currentEventDay();
  if (day !== state.day) {
    // switch to today
    state.day = day;
    $$('.day-tab').forEach(b => b.classList.toggle('active', +b.dataset.day === day));
    rerender();
  }
  // Find current/next slot section
  const now = nowMinutes();
  const slots = [...document.querySelectorAll('[data-slotmin]')].map(el => ({el, min: +el.dataset.slotmin}));
  slots.sort((a,b) => a.min - b.min);
  let target = slots.find(s => s.min >= now - 15) || slots[slots.length-1];
  if (target) {
    target.el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function updateJumpBtn() {
  const btn = $('#jumpNow');
  const day = currentEventDay();
  if (day !== state.day) { btn.classList.remove('show'); return; }
  // Show if there's a "now" slot but it's not in viewport
  const nowSlot = document.querySelector('[data-status="now"]');
  if (!nowSlot) { btn.classList.remove('show'); return; }
  const rect = nowSlot.getBoundingClientRect();
  const inView = rect.top > -50 && rect.top < window.innerHeight * 0.5;
  btn.classList.toggle('show', !inView);
}

// =================== RENDER DISPATCH ===================
function rerender() {
  updateChipCounts();
  renderNowPanel();
  if (state.view === 'top') renderTop();
  else if (state.view === 'grid') renderGrid();
  else renderList();
  updateJumpBtn();
}

// =================== INIT ===================
function tickInd() {
  const d = new Date();
  $('#nowInd').textContent = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}
tickInd(); setInterval(tickInd, 30000);

fetch('sessions.json', { cache: 'no-cache' })
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(data => {
    SESSIONS = applyTimezoneOffset(data, TIMEZONE_OFFSET_MINUTES);
    attachEvents();
    const td = currentEventDay();
    state.day = td;
    $$('.day-tab').forEach(b => b.classList.toggle('active', +b.dataset.day === td));
    rerender();
    setInterval(() => { renderNowPanel(); updateJumpBtn(); }, 60000);
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  })
  .catch(err => {
    document.querySelector('main').innerHTML =
      '<div style="padding:24px;color:#a6a6ad;font-family:JetBrains Mono,monospace;font-size:13px;line-height:1.6">' +
      '<strong style="color:#ffb627">Could not load sessions.json</strong><br><br>' +
      'Error: ' + (err && err.message ? err.message : err) + '<br><br>' +
      'If you forked this repo, make sure <code>sessions.json</code> sits next to <code>index.html</code>.' +
      '</div>';
  });

</script>


<div class="install-hint" id="installHint" role="dialog" aria-label="Install instructions">
  <h3 id="hintTitle">Add to home screen for fullscreen</h3>
  <p id="hintBody"></p>
  <div class="actions">
    <button class="dismiss" id="hintDismiss">Later</button>
    <button class="got-it" id="hintGotIt">Got it</button>
  </div>
</div>
<script>
(function(){
  const ua = navigator.userAgent.toLowerCase();
  const isIOS = /iphone|ipad|ipod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  const isAndroid = /android/.test(ua);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches
                    || window.navigator.standalone === true;
  const dismissed = localStorage.getItem('aiweek_hint_dismissed') === '1';

  // iOS share icon (square with up arrow)
  const iosShareIcon = '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#ffb627" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M8 7l4-4 4 4"/><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7"/></svg>';

  let title, body;
  if (isIOS) {
    title = 'Add to Home Screen';
    body = 'Tap the Share icon ' + iosShareIcon + ' at the bottom of Safari, then choose <strong>Add to Home Screen</strong>. Launch from the icon for a fullscreen, app-like view.';
  } else if (isAndroid) {
    title = 'Add to Home Screen';
    body = 'Open the Chrome menu (<kbd>⋮</kbd>) and choose <strong>Add to Home screen</strong>. Launch from the icon to get a fullscreen, app-like view.';
  } else {
    title = 'Install as app';
    body = 'In Chrome / Edge: open the menu and choose <strong>Install AI Week</strong> (or <strong>Apps → Install this site</strong>) for a dedicated window.';
  }

  if (!isStandalone && !dismissed) {
    document.getElementById('hintTitle').textContent = title;
    document.getElementById('hintBody').innerHTML = body;
    setTimeout(() => document.getElementById('installHint').classList.add('show'), 1500);
  }
  function hide(remember) {
    document.getElementById('installHint').classList.remove('show');
    if (remember) localStorage.setItem('aiweek_hint_dismissed', '1');
  }
  document.getElementById('hintGotIt').addEventListener('click', () => hide(true));
  document.getElementById('hintDismiss').addEventListener('click', () => hide(false));

  // Listen for Chrome's beforeinstallprompt as a bonus path on Android
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    // If hint is visible, repurpose the "Got it" button into an Install button
    const btn = document.getElementById('hintGotIt');
    if (btn) {
      btn.textContent = 'Install';
      btn.addEventListener('click', async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          await deferredPrompt.userChoice;
          deferredPrompt = null;
          hide(true);
        }
      }, { once: true });
    }
  });
})();
</script>
</body>
</html>
